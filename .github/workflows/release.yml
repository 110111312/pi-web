name: Release
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
permissions:
  contents: write
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          if [ "v${PACKAGE_VERSION}" != "${TAG_NAME}" ]; then
            echo "Tag ${TAG_NAME} does not match package version v${PACKAGE_VERSION}"
            exit 1
          fi
      - name: Run Lints
        run: pnpm run lint
      - name: Run Svelet check
        run: pnpm run check:web
      - name: Run tests
        run: pnpm test
      - name: Build server bundle
        run: pnpm run build:server
      - name: Build published Svelte web bundle
        run: pnpm run build:web
      - name: Pack npm tarball
        run: pnpm pack --pack-destination .artifacts
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: .artifacts/*.tgz
      - name: Generate changelog
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  electron:
    name: Build Electron (${{ matrix.os }})
    if:
      startsWith(github.ref, 'refs/tags/') || github.event_name ==
      'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build published Svelte web bundle
        run: pnpm run build:web
      - name: Build Electron main bundle
        run: pnpm -C packages/electron build
      - name: Package Electron distributables
        run: pnpm -C packages/electron exec electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/*.AppImage
            dist-electron/*.tar.gz
            dist-electron/*.exe
            dist-electron/*.blockmap
            dist-electron/latest*.yml
          if-no-files-found: error

  github-release:
    name: Create GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - publish
      - electron
    runs-on: ubuntu-latest
    steps:
      - name: Download npm package artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: .artifacts/npm-package
      - name: Download Electron artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: electron-*
          path: .artifacts/electron
          merge-multiple: true
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .artifacts/npm-package/*.tgz
            .artifacts/electron/*
          generate_release_notes: true
